<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabControl Pro - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at 30% 50%, #1a1a3e 0%, #0b0b13 100%);
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s ease;
        }
        
        .login-card {
            background: linear-gradient(145deg, var(--card-alt), var(--card));
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(106,0,255,0.2);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-logo i {
            font-size: 48px;
            background: linear-gradient(135deg, var(--neon-azul), var(--roxo));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        
       .login-logo h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(90deg, #fff, var(--neon-azul), var(--roxo));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 0;
    text-align: center;
    letter-spacing: 2px;
    width: 100%;
    display: block;
}
        
        .login-logo p {
            color: var(--muted);
            font-size: 14px;
            margin-top: 5px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group label i {
            color: var(--neon-azul);
            font-size: 14px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            padding-right: 50px;
            background: rgba(15, 15, 31, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .input-wrapper input:focus {
            border-color: var(--neon-azul);
            box-shadow: 0 0 15px rgba(0,217,255,0.3);
            background: rgba(20, 20, 39, 0.9);
        }
        
        .input-wrapper input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        /* Estilo para o domínio fixo */
        .domain-suffix {
            position: absolute;
            right: 16px;
            color: var(--neon-azul);
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
            background: rgba(0,217,255,0.1);
            padding: 4px 8px;
            border-radius: 6px;
        }
        
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
        
        .toggle-password:hover {
            color: var(--neon-azul);
            background: rgba(0,217,255,0.1);
        }
        
        .login-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            cursor: pointer;
        }
        
        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: var(--neon-azul);
            cursor: pointer;
        }
        
        .forgot-password {
            color: var(--neon-azul);
            font-size: 13px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .forgot-password:hover {
            color: var(--roxo);
            text-shadow: 0 0 10px var(--roxo);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--roxo), var(--neon-azul));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(106,0,255,0.4);
            position: relative;
            overflow: hidden;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(106,0,255,0.6), 0 0 30px var(--neon-azul);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login.loading {
            pointer-events: none;
            opacity: 0.8;
        }
        
        .btn-login.loading i {
            animation: rotate 1s linear infinite;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: var(--muted);
            font-size: 13px;
        }
        
        .login-footer a {
            color: var(--neon-azul);
            text-decoration: none;
        }
        
        .error-message {
            background: rgba(255,59,88,0.1);
            border: 1px solid var(--neon-vermelho);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: var(--neon-vermelho);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: cardEntrance 0.3s ease;
        }
        
        .error-message i {
            font-size: 18px;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-tablet-alt"></i>
                <h1>TABCONTROL PRO</h1>
                <p>Sistema de Gerenciamento de Tablets</p>
            </div>
            
            <div id="error-container"></div>
            
            <form id="login-form" onsubmit="return false;">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <div class="input-wrapper">
                        <input type="text" id="email" placeholder="seu usuário" required autocomplete="off">
                        <span class="domain-suffix">@tabcontrol.com</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="senha" placeholder="••••••••" required>
                        <span class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="toggle-icon"></i>
                        </span>
                    </div>
                </div>
                
                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> Lembrar-me
                    </label>
                    <a href="#" class="forgot-password" onclick="showForgotPassword()">
                        <i class="fas fa-key"></i> Esqueceu a senha?
                    </a>
                </div>
                
                <button type="submit" class="btn-login" id="btn-login" onclick="fazerLogin()">
                    <i class="fas fa-sign-in-alt"></i> Entrar no Sistema
                </button>
            </form>
            
            <div class="login-footer">
                <i class="fas fa-shield-alt"></i> Acesso restrito a colaboradores autorizados
            </div>
        </div>
        
        <div class="login-footer" style="margin-top: 20px;">
            TabControl Pro • v4.0 • © 2026
        </div>
    </div>
    
    <script>
        // Verificar se já está logado - EVITA LOOP
        async function verificarSessao() {
            try {
                const response = await fetch('/api/usuario/atual');
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.id) {
                        window.location.href = '/';
                    }
                }
            } catch (error) {
                console.log('Usuário não autenticado');
            }
        }
        
        verificarSessao();
        
        // Verificar se tem email salvo
        const savedEmail = localStorage.getItem('remember_email');
        if (savedEmail) {
            // Remove o @tabcontrol.com se estiver salvo
            const emailSemDominio = savedEmail.replace('@tabcontrol.com', '');
            document.getElementById('email').value = emailSemDominio;
            document.getElementById('remember').checked = true;
        }
        
        function togglePassword() {
            const input = document.getElementById('senha');
            const icon = document.getElementById('toggle-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>${message}</span>
                </div>
            `;
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
        
        async function fazerLogin() {
    let emailInput = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const remember = document.getElementById('remember').checked;
    const btn = document.getElementById('btn-login');
    
    if (!emailInput || !senha) {
        showError('Preencha todos os campos!');
        return;
    }
    
    // Adiciona o domínio automaticamente se não tiver @
    if (!emailInput.includes('@')) {
        emailInput = emailInput + '@tabcontrol.com';
    }
    
    // Mostrar loading
    btn.classList.add('loading');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
    
    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: emailInput, senha })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            if (remember) {
                localStorage.setItem('remember_email', emailInput);
            } else {
                localStorage.removeItem('remember_email');
            }
            
            // ✅ CORRIGIDO: Remove o loading e mostra check
            btn.classList.remove('loading');
            btn.innerHTML = '<i class="fas fa-check"></i> Login realizado!';
            
            setTimeout(() => {
                window.location.href = data.redirect || '/';
            }, 800); // Um pouco mais de tempo para ver o "check"
        } else {
            btn.classList.remove('loading');
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar no Sistema';
            showError(data.error || 'Erro ao fazer login');
        }
    } catch (error) {
        btn.classList.remove('loading');
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar no Sistema';
        showError('Erro de conexão. Tente novamente.');
    }
}
        
        function showForgotPassword() {
            showError('Entre em contato com o administrador do sistema para redefinir sua senha.');
        }
        
        // Enter para enviar
        document.getElementById('senha').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });
        
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('senha').focus();
            }
        });
        
        // Foco automático no campo email
        document.getElementById('email').focus();
    </script>
</body>
</html>

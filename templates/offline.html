<!-- templates/offline.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabControl - Aguardando Conexão</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 30% 50%, #1a1a3e 0%, #0b0b13 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            max-width: 400px;
            width: 100%;
            animation: pulse 2s infinite;
        }
        
        .offline-card {
            background: linear-gradient(145deg, #141427, #191933);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 40px rgba(106,0,255,0.2);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .logo-animation {
            margin-bottom: 30px;
            position: relative;
        }
        
        .tablet-icon {
            font-size: 64px;
            background: linear-gradient(135deg, #00d9ff, #6a00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: float 3s ease-in-out infinite;
        }
        
        .signal-waves {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }
        
        .wave {
            width: 6px;
            height: 20px;
            background: linear-gradient(180deg, #00ff88, #00d9ff);
            border-radius: 10px;
            animation: wave 1.2s ease-in-out infinite;
        }
        
        .wave:nth-child(1) { animation-delay: 0s; height: 15px; }
        .wave:nth-child(2) { animation-delay: 0.2s; height: 25px; }
        .wave:nth-child(3) { animation-delay: 0.4s; height: 35px; }
        .wave:nth-child(4) { animation-delay: 0.6s; height: 25px; }
        .wave:nth-child(5) { animation-delay: 0.8s; height: 15px; }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #00d9ff, #6a00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        .status-text {
            color: #e8e8f2;
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            background: #00d9ff;
            border-radius: 50%;
            animation: dot 1.4s ease-in-out infinite;
            box-shadow: 0 0 15px #00d9ff;
        }
        
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        
        .info-message {
            background: rgba(0,217,255,0.08);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(0,217,255,0.15);
        }
        
        .info-message p {
            color: #9aa0aa;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .info-message i {
            color: #00d9ff;
            margin-right: 8px;
        }
        
        .btn-retry {
            background: linear-gradient(135deg, #6a00ff, #00d9ff);
            border: none;
            border-radius: 50px;
            padding: 14px 28px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(106,0,255,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
        }
        
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(106,0,255,0.6), 0 0 30px #00d9ff;
        }
        
        .btn-retry:active {
            transform: translateY(0);
        }
        
        .btn-retry i {
            font-size: 18px;
        }
        
        .attempt-counter {
            margin-top: 15px;
            color: #9aa0aa;
            font-size: 13px;
        }
        
        .footer {
            margin-top: 20px;
            color: #9aa0aa;
            font-size: 12px;
            opacity: 0.7;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(1); opacity: 0.5; }
            50% { transform: scaleY(1.5); opacity: 1; }
        }
        
        @keyframes dot {
            0%, 80%, 100% { transform: scale(1); opacity: 0.5; }
            40% { transform: scale(1.3); opacity: 1; }
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-card">
            <div class="logo-animation">
                <i class="fas fa-tablet-alt tablet-icon"></i>
                <div class="signal-waves">
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                </div>
            </div>
            
            <h1>TABCONTROL PRO</h1>
            <div class="status-text" id="status-text">
                <i class="fas fa-sync-alt fa-spin"></i> Aguardando conexão...
            </div>
            
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            
            <div class="info-message">
                <p>
                    <i class="fas fa-info-circle"></i>
                    <span id="info-text">Verificando conexão com o servidor...</span>
                </p>
            </div>
            
            <button class="btn-retry" onclick="verificarConexao()">
                <i class="fas fa-redo-alt"></i> Tentar Novamente
            </button>
            
            <div class="attempt-counter" id="attempt-counter">
                Tentativa <span id="attempt-number">1</span> de 10
            </div>
            
            <div class="footer">
                <i class="fas fa-cloud"></i> TabControl Pro • Aguardando servidor
            </div>
        </div>
    </div>
    
    <script>
        let tentativas = 0;
        const maxTentativas = 10;
        let verificando = false;
        let progressInterval = null;
        
        function atualizarProgresso() {
            const progress = (tentativas / maxTentativas) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('attempt-number').textContent = tentativas;
        }
        
        function atualizarStatus(mensagem, icone = 'sync-alt') {
            const statusEl = document.getElementById('status-text');
            statusEl.innerHTML = `<i class="fas fa-${icone}"></i> ${mensagem}`;
        }
        
        function atualizarInfo(mensagem) {
            document.getElementById('info-text').textContent = mensagem;
        }
        
        async function verificarConexao() {
            if (verificando) return;
            
            verificando = true;
            tentativas++;
            atualizarProgresso();
            
            const btn = document.querySelector('.btn-retry');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando...';
            btn.disabled = true;
            
            atualizarStatus('Verificando conexão...', 'spinner fa-spin');
            atualizarInfo('Tentando conectar ao servidor...');
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                
                const response = await fetch('https://tabcontrol-pro.onrender.com/api/estatisticas', {
                    signal: controller.signal,
                    cache: 'no-cache'
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    atualizarStatus('Conexão restabelecida!', 'check-circle');
                    atualizarInfo('Redirecionando para o sistema...');
                    
                    setTimeout(() => {
                        window.location.href = 'https://tabcontrol-pro.onrender.com';
                    }, 1000);
                } else {
                    throw new Error('Servidor não respondeu');
                }
            } catch (error) {
                console.log('Erro de conexão:', error.message);
                
                if (error.name === 'AbortError') {
                    atualizarStatus('Tempo limite excedido', 'clock');
                    atualizarInfo('O servidor demorou muito para responder.');
                } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    atualizarStatus('Sem conexão com a internet', 'wifi-slash');
                    atualizarInfo('Verifique sua conexão WiFi ou dados móveis.');
                } else {
                    atualizarStatus('Servidor indisponível', 'server');
                    atualizarInfo('O servidor está fora do ar ou em manutenção.');
                }
                
                btn.innerHTML = '<i class="fas fa-redo-alt"></i> Tentar Novamente';
                btn.disabled = false;
                
                if (tentativas >= maxTentativas) {
                    atualizarInfo('Máximo de tentativas atingido. Aguarde alguns minutos.');
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    
                    setTimeout(() => {
                        tentativas = 0;
                        atualizarProgresso();
                        btn.disabled = false;
                        btn.style.opacity = '1';
                        atualizarInfo('Pronto para tentar novamente.');
                    }, 60000); // Espera 1 minuto
                }
            }
            
            verificando = false;
        }
        
        function verificarAutomaticamente() {
            if (!verificando && tentativas < maxTentativas) {
                verificarConexao();
            }
        }
        
        // Iniciar verificação automática ao carregar a página
        window.addEventListener('load', () => {
            setTimeout(verificarAutomaticamente, 2000);
        });
        
        // Verificar a cada 15 segundos
        setInterval(verificarAutomaticamente, 15000);
        
        // Tentar novamente quando a página ficar online
        window.addEventListener('online', () => {
            if (!verificando) {
                tentativas = 0;
                atualizarProgresso();
                verificarConexao();
            }
        });
    </script>
</body>
</html>

<!-- templates/logs.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabControl Pro - Logs do Sistema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .logs-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        
        .logs-filtros {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .log-card {
            background: linear-gradient(145deg, var(--card-alt), var(--card));
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 20px;
        }
        
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .log-table th {
            text-align: left;
            padding: 14px 12px;
            background: rgba(0,0,0,0.3);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .log-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .log-table tr:hover {
            background: rgba(106,0,255,0.1);
        }
        
        .log-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            min-width: 90px;
        }
        
        .badge-login { background: var(--neon-verde); color: #000; }
        .badge-logout { background: rgba(255,165,0,0.3); color: #FFA500; }
        .badge-retirada { background: rgba(0,217,255,0.2); color: var(--neon-azul); }
        .badge-devolucao { background: rgba(0,255,136,0.2); color: var(--neon-verde); }
        .badge-cadastro { background: var(--roxo); color: white; }
        .badge-exclusao { background: rgba(255,59,88,0.2); color: var(--neon-vermelho); }
        .badge-edicao { background: rgba(255,165,0,0.2); color: #FFA500; }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .stats-mini {
            display: flex;
            gap: 20px;
        }
        
        .stat-mini-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
        }
        
        .stat-mini-item i {
            color: var(--neon-azul);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="topbar">
            <div class="brand">
                <i class="fas fa-tablet-alt"></i> TOTAL DE TABLETS
            </div>
            <div class="links">
                <a href="/"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="/cadastro"><i class="fas fa-plus-circle"></i> Novo Tablet</a>
                <a href="/historico"><i class="fas fa-history"></i> Histórico</a>
                <a href="/admin" style="background: rgba(106,0,255,0.2);"><i class="fas fa-crown"></i> Admin</a>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </div>
        </div>

        <div class="container">
            <div class="logs-header">
                <h1><i class="fas fa-history"></i> LOGS DO SISTEMA</h1>
                <div class="logs-filtros">
                    <button class="btn btn-roxo ghost" onclick="carregarLogs()">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                </div>
            </div>
            
            <div class="log-card">
                <table class="log-table">
                    <thead>
                        <tr>
                            <th><i class="fas fa-calendar"></i> Data/Hora</th>
                            <th><i class="fas fa-user"></i> Usuário</th>
                            <th><i class="fas fa-tag"></i> Ação</th>
                            <th><i class="fas fa-align-left"></i> Descrição</th>
                            <th><i class="fas fa-tablet"></i> Tablet</th>
                            <th><i class="fas fa-network-wired"></i> IP</th>
                        </tr>
                    </thead>
                    <tbody id="logs-tbody">
                        <tr><td colspan="6" style="text-align: center;">Carregando...</td></tr>
                    </tbody>
                </table>
                
                <div class="pagination">
                    <button id="btn-anterior" class="btn btn-roxo ghost" onclick="mudarPagina(-1)" disabled>
                        <i class="fas fa-chevron-left"></i> Anterior
                    </button>
                    <span id="pagina-info" style="padding: 8px 16px;">Página 1</span>
                    <button id="btn-proxima" class="btn btn-roxo ghost" onclick="mudarPagina(1)" disabled>
                        Próxima <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
            
            <div class="footer">
                <i class="fas fa-shield-alt"></i> Logs do Sistema • Acesso exclusivo para administradores
            </div>
        </div>
    </div>
    
    <script>
        let paginaAtual = 1;
        let totalPaginas = 1;
        
        function getBadgeClass(acao) {
            const map = {
                'login': 'badge-login',
                'logout': 'badge-logout',
                'retirada': 'badge-retirada',
                'devolucao': 'badge-devolucao',
                'cadastro_tablet': 'badge-cadastro',
                'cadastro_usuario': 'badge-cadastro',
                'exclusao_tablet': 'badge-exclusao',
                'exclusao_usuario': 'badge-exclusao',
                'edicao_usuario': 'badge-edicao'
            };
            return map[acao] || 'badge-cadastro';
        }
        
        function getAcaoNome(acao) {
            const map = {
                'login': '🔐 Login',
                'logout': '🚪 Logout',
                'retirada': '📤 Retirada',
                'devolucao': '📥 Devolução',
                'cadastro_tablet': '📱 Cadastro Tablet',
                'cadastro_usuario': '👤 Cadastro Usuário',
                'exclusao_tablet': '🗑️ Exclusão Tablet',
                'exclusao_usuario': '🚫 Exclusão Usuário',
                'edicao_usuario': '✏️ Edição Usuário'
            };
            return map[acao] || acao;
        }
        
        async function carregarLogs() {
            try {
                const response = await fetch(`/api/logs?page=${paginaAtual}`);
                const data = await response.json();
                
                totalPaginas = data.pages;
                document.getElementById('pagina-info').textContent = `Página ${data.current_page} de ${data.pages}`;
                document.getElementById('btn-anterior').disabled = data.current_page === 1;
                document.getElementById('btn-proxima').disabled = data.current_page === data.pages;
                
                const tbody = document.getElementById('logs-tbody');
                
                if (data.items.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;"><i class="fas fa-inbox"></i> Nenhum log encontrado</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                
                data.items.forEach(log => {
                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td><i class="far fa-clock"></i> ${log.data}</td>
                        <td>
                            <strong>${log.usuario}</strong><br>
                            <small style="color: var(--muted);">${log.usuario_email || ''}</small>
                        </td>
                        <td>
                            <span class="log-badge ${getBadgeClass(log.acao)}">
                                ${getAcaoNome(log.acao)}
                            </span>
                        </td>
                        <td>${log.descricao}</td>
                        <td>${log.tablet ? `Tablet ${log.tablet}` : '—'}</td>
                        <td><i class="fas fa-globe"></i> ${log.ip || '—'}</td>
                    `;
                    
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Erro ao carregar logs:', error);
                document.getElementById('logs-tbody').innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--neon-vermelho);">Erro ao carregar logs</td></tr>';
            }
        }
        
        function mudarPagina(delta) {
            const novaPagina = paginaAtual + delta;
            if (novaPagina >= 1 && novaPagina <= totalPaginas) {
                paginaAtual = novaPagina;
                carregarLogs();
            }
        }
        
        document.addEventListener('DOMContentLoaded', carregarLogs);
    </script>
</body>
</html>
